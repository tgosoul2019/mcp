# ══════════════════════════════════════════════════════════════════════════════
# MCP Portal — portal.observabilidadebrasil.com.br
# ══════════════════════════════════════════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name portal.observabilidadebrasil.com.br;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name portal.observabilidadebrasil.com.br;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/portal.observabilidadebrasil.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.observabilidadebrasil.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/mcp-portal.access.log;
    error_log  /var/log/nginx/mcp-portal.error.log;

    # Global auth for all locations (same realm = credentials shared)
    auth_basic "MCP Portal";
    auth_basic_user_file /etc/nginx/.mcp-htpasswd;

    # ── Portal page ───────────────────────────────────────────────────────────
    location = / {
        proxy_pass http://127.0.0.1:9200/portal;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Admin API ─────────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://127.0.0.1:9200/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── v1 API (chat, models, etc) ────────────────────────────────────────────
    location /v1/ {
        proxy_pass http://127.0.0.1:9200/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Health (no auth) ──────────────────────────────────────────────────────
    location = /health {
        auth_basic off;
        proxy_pass http://127.0.0.1:9200/health;
        proxy_set_header Host $host;
    }

    # ── Docs (no auth) ────────────────────────────────────────────────────────
    location /docs {
        auth_basic off;
        proxy_pass http://127.0.0.1:9200/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        auth_basic off;
        proxy_pass http://127.0.0.1:9200/openapi.json;
        proxy_set_header Host $host;
    }
}
