# ══════════════════════════════════════════════════════════════════════════════
# MCP Server — nginx configuration
# mcp.observabilidadebrasil.org
#
# Deploy:
#   sudo cp mcp.conf /etc/nginx/sites-available/mcp
#   sudo ln -sf /etc/nginx/sites-available/mcp /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════════════════════

# Rate limit zones (separate from KCP)
limit_req_zone $binary_remote_addr zone=mcp_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=mcp_chat:10m rate=10r/s;

# Upstream
upstream mcp_backend {
    server 127.0.0.1:9200;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name mcp.observabilidadebrasil.org;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name mcp.observabilidadebrasil.org;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/mcp.observabilidadebrasil.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.observabilidadebrasil.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging (separate from KCP)
    access_log /var/log/nginx/mcp.access.log;
    error_log  /var/log/nginx/mcp.error.log;

    # ── Health endpoint (no rate limit) ───────────────────────────────────────
    location = /health {
        proxy_pass http://mcp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Chat completions (rate limited) ───────────────────────────────────────
    location /v1/chat/completions {
        limit_req zone=mcp_chat burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://mcp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── API endpoints ─────────────────────────────────────────────────────────
    location /v1/ {
        limit_req zone=mcp_api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://mcp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Admin/monitoring (Basic Auth) ─────────────────────────────────────────
    location /admin/ {
        auth_basic "MCP Admin";
        auth_basic_user_file /etc/nginx/.mcp-htpasswd;

        proxy_pass http://mcp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Docs ──────────────────────────────────────────────────────────────────
    location /docs {
        proxy_pass http://mcp_backend;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://mcp_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://mcp_backend;
        proxy_set_header Host $host;
    }

    # ── Default: 404 ──────────────────────────────────────────────────────────
    location / {
        add_header Content-Type application/json always;
        return 404 '{"error": "Not found", "docs": "https://mcp.observabilidadebrasil.org/docs"}';
    }
}
